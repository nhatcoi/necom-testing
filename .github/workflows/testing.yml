name: Necom Test Pipeline

on:
  pull_request:
  push:
    branches:
      - main
      - ntronic

jobs:
  backend-unit-integration:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./necom/necom-server
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Run unit tests
        run: mvn -B test -Dtest="*Test"

      - name: Run integration tests
        run: mvn -B failsafe:integration-test failsafe:verify -Dit.test="*IT"

      - name: Generate coverage report
        run: mvn -B jacoco:report

      - name: Upload backend reports
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: |
            necom/necom-server/target/surefire-reports
            necom/necom-server/target/failsafe-reports
            necom/necom-server/target/site/jacoco

  frontend-rtl:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./necom/necom-client
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: necom/necom-client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run RTL tests with coverage
        run: CI=true npm test -- --watchAll=false --coverage

      - name: Upload frontend reports
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-reports
          path: |
            necom/necom-client/coverage

  blackbox-sit-e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./necom-testing
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: necom-testing/package-lock.json

      - name: Boot local stack
        run: docker compose -f ../necom/docker-compose.yml up -d necom-database necom-server necom-client

      - name: Wait for backend health
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:8085/actuator/health >/dev/null; then
              exit 0
            fi
            sleep 10
          done
          echo "Backend did not become healthy in time"
          exit 1

      - name: Install black-box dependencies
        run: npm ci

      - name: Run API SIT
        run: npm run test:api

      - name: Run UI E2E
        run: npm run test:ui

      - name: Upload black-box artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blackbox-test-artifacts
          path: |
            necom-testing/reports
            necom-testing/cypress/videos
            necom-testing/cypress/screenshots

      - name: Shutdown stack
        if: always()
        run: docker compose -f ../necom/docker-compose.yml down
